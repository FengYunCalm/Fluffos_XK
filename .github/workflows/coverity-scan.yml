name: Coverity Scan

on:
  schedule:
    - cron: '0 18 * * 0' # Weekly at 18:00 UTC
  workflow_dispatch:

env:
  COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
  COVERITY_SCAN_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
  COVERITY_SCAN_PROJECT: FengYunCalm/Fluffos_XK

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build: ["Debug", "RelWithDebInfo"]
        os: ["ubuntu-latest"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Skip when Coverity token is not configured
        if: env.COVERITY_SCAN_TOKEN == ''
        run: |
          echo "::notice::COVERITY_SCAN_TOKEN is not configured; skipping Coverity Scan."
      - name: Install packages
        if: env.COVERITY_SCAN_TOKEN != ''
        run: |
          sudo apt update
          sudo apt install -y build-essential autoconf automake bison expect libmysqlclient-dev libpcre3-dev libpq-dev libsqlite3-dev libssl-dev libtool libz-dev telnet libgtest-dev libjemalloc-dev
      - name: configure
        if: env.COVERITY_SCAN_TOKEN != ''
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DPACKAGE_DB_SQLITE=2 ..
      - name: Download Coverity Build Tool
        if: env.COVERITY_SCAN_TOKEN != ''
        run: |
          wget -q https://scan.coverity.com/download/cxx/linux64 --post-data "token=$COVERITY_SCAN_TOKEN&project=FengYunCalm%2FFluffos_XK" -O cov-analysis-linux64.tar.gz
          mkdir cov-analysis-linux64
          tar xzf cov-analysis-linux64.tar.gz --strip 1 -C cov-analysis-linux64
      - name: Build with cov-build
        if: env.COVERITY_SCAN_TOKEN != ''
        run: |
          export PATH=`pwd`/cov-analysis-linux64/bin:$PATH
          cd build
          cov-build --dir cov-int make -j 2 install
      - name: Submit the result to Coverity Scan
        if: env.COVERITY_SCAN_TOKEN != ''
        run: |
          cd build
          tar czvf fluffos.tgz cov-int
          curl \
            --form project="$COVERITY_SCAN_PROJECT" \
            --form token="$COVERITY_SCAN_TOKEN" \
            --form email="${COVERITY_SCAN_EMAIL:-noreply@example.com}" \
            --form file=@fluffos.tgz \
            --form version="`git rev-parse HEAD` - ${{ matrix.build }}" \
            --form description="`git rev-parse HEAD` - ${{ matrix.build }}" \
            https://scan.coverity.com/builds?project=FengYunCalm%2FFluffos_XK
